# Secret scan on every push and pull request.
#
# Catches tokens / keys / credentials that would otherwise land in public
# history. Runs gitleaks over the full commit set being pushed (the checkout
# uses fetch-depth: 0 so the entire reachable history is scanned, not just
# the tip). The config lives at .gitleaks.toml in the repo root.
#
# Pairs with the local scripts/hooks/pre-push hook installed via
# scripts/install-git-hooks.sh. The local hook blocks secrets BEFORE they
# reach the remote; this workflow catches them if the hook is bypassed with
# --no-verify or if a PR comes from a fork without the hook.

name: gitleaks

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - name: checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install gitleaks
        run: |
          set -euo pipefail
          # Pin a specific version for reproducibility.
          VERSION=v8.21.2
          ARCHIVE="gitleaks_${VERSION#v}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/${ARCHIVE}" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: scan repository
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --redact \
            --no-banner
