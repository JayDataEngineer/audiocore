[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    lifecycle: ComfyUI + custom node registration health
    model_mgmt: load/unload/cache lifecycle of audiocore sessions
    auto_fetch: manifest-driven model auto-download + convert
    inference: end-to-end audio generation with REAL output verification
    slow: tests that take >30s
addopts = -ra --tb=short --strict-markers
log_cli = false
